<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepEd Assessment & TOS Generator | DepEd Aligned</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        .tos-table, .test-table, .key-table { 
            @apply w-full border-collapse my-4 text-xs md:text-sm; 
        }
        .tos-table th, .tos-table td, 
        .test-table th, .test-table td, 
        .key-table th, .key-table td { 
            @apply border border-gray-300 p-1.5 text-left align-middle; 
        }
        .tos-table th {
            @apply bg-gray-100 font-semibold text-center text-gray-800 text-xs;
        }
        .tos-table tr.total-row {
            @apply bg-green-600 text-white font-bold;
        }
        .header-text {
            @apply text-center text-gray-800 text-xs md:text-sm;
        }
        .section-title { 
            @apply text-lg font-bold my-4 text-center text-gray-800; 
        }
        .loading { @apply text-orange-600 font-bold; }
        .btn { @apply px-4 py-2 rounded text-white font-medium transition shadow-sm text-sm; }
        .btn-pdf { @apply bg-red-600 hover:bg-red-700; }
        .btn-word { @apply bg-blue-600 hover:bg-blue-700; }
    </style>
</head>
<body class="bg-gray-50 max-w-7xl mx-auto p-4 md:p-6">

    <header class="text-center mb-6">
        <h1 class="text-2xl md:text-3xl font-bold text-blue-800">DepEd Assessment & TOS Generator</h1>
        <p class="text-gray-600 text-sm">Complete K-12 Multi-Language Matrix Generator</p>
    </header>

    <div class="bg-white rounded-lg shadow p-5 mb-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-800">Test & School Details</h2>
        <div class="grid md:grid-cols-3 gap-4">
            <div>
                <label class="block mb-1 font-medium text-gray-700 text-sm">Region</label>
                <input type="text" id="region" class="w-full p-2 border border-gray-300 rounded text-sm" placeholder="e.g. Region XI">
            </div>
            <div>
                <label class="block mb-1 font-medium text-gray-700 text-sm">Schools Division Office</label>
                <input type="text" id="division" class="w-full p-2 border border-gray-300 rounded text-sm" placeholder="e.g. Division of Davao City">
            </div>
            <div>
                <label class="block mb-1 font-medium text-gray-700 text-sm">School Name</label>
                <input type="text" id="school" class="w-full p-2 border border-gray-300 rounded text-sm" placeholder="e.g. Davao Central Elementary School">
            </div>
            <div>
                <label class="block mb-1 font-medium text-gray-700 text-sm">Grade Level</label>
                <select id="grade" class="w-full p-2 border border-gray-300 rounded text-sm" onchange="updateLearningAreas()">
                    <option value="Kindergarten">Kindergarten</option>
                    <option value="Grade 1">Grade 1</option>
                    <option value="Grade 2">Grade 2</option>
                    <option value="Grade 3">Grade 3</option>
                    <option value="Grade 4">Grade 4</option>
                    <option value="Grade 5">Grade 5</option>
                    <option value="Grade 6">Grade 6</option>
                    <option value="Grade 7">Grade 7</option>
                    <option value="Grade 8">Grade 8</option>
                    <option value="Grade 9">Grade 9</option>
                    <option value="Grade 10">Grade 10</option>
                    <option value="Grade 11">Grade 11 (SHS)</option>
                    <option value="Grade 12">Grade 12 (SHS)</option>
                </select>
            </div>
            <div>
                <label class="block mb-1 font-medium text-gray-700 text-sm">Learning Area</label>
                <select id="subject" class="w-full p-2 border border-gray-300 rounded text-sm">
                    </select>
            </div>
            <div>
                <label class="block mb-1 font-medium text-gray-700 text-sm">Type of Test</label>
                <select id="testType" class="w-full p-2 border border-gray-300 rounded text-sm">
                    <option value="Summative Test">Summative Test</option>
                    <option value="Quarterly Examination">Quarterly Examination</option>
                    <option value="Diagnostic Test">Diagnostic Test</option>
                </select>
            </div>
            <div>
                <label class="block mb-1 font-medium text-gray-700 text-sm">Term</label>
                <select id="quarter" class="w-full p-2 border border-gray-300 rounded text-sm">
                    <option value="1st Term">1st Term</option>
                    <option value="2nd Term">2nd Term</option>
                    <option value="3rd Term">3rd Term</option>
                </select>
            </div>
            <div>
                <label class="block mb-1 font-medium text-gray-700 text-sm">School Year</label>
                <input type="text" id="sy" class="w-full p-2 border border-gray-300 rounded text-sm" placeholder="e.g. 2026-2027">
            </div>
            <div>
                <label class="block mb-1 font-medium text-gray-700 text-sm">Total Items</label>
                <select id="totalItems" class="w-full p-2 border border-gray-300 rounded text-sm">
                    <option value="15">15 Items</option>
                    <option value="20">20 Items</option>
                    <option value="30">30 Items</option>
                    <option value="40">40 Items</option>
                    <option value="50">50 Items</option>
                </select>
            </div>
        </div>

        <div class="mt-4">
            <label class="block mb-2 font-medium text-gray-700 text-sm">Learning Competencies (Paste each competency on a new line):</label>
            <textarea id="competencies" rows="6" class="w-full p-2 border border-gray-300 rounded text-sm" placeholder="Example:
Demonstrate understanding of the correct use of verbs in sentences.
Classify various materials as solid, liquid, or gas based on attributes."></textarea>
        </div>

        <button onclick="generateAll()" id="generateBtn" class="mt-5 w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3 px-4 rounded transition">
            Generate TOS & Test Questions
        </button>
        <p id="status" class="mt-2 text-center text-sm"></p>
    </div>

    <div id="output" class="hidden">
        <div class="flex gap-3 mb-4">
            <button onclick="exportPDF()" class="btn btn-pdf">Export as PDF</button>
            <button onclick="exportWord()" class="btn btn-word">Export as Word (DOC)</button>
        </div>

        <div id="documentPrintView" class="space-y-6">
            <div class="bg-white rounded-lg shadow p-5 border border-gray-200">
                <div class="mb-4">
                    <p class="header-text">Republic of the Philippines</p>
                    <p class="header-text font-bold text-base">Department of Education</p>
                    <p class="header-text font-medium" id="tosRegion"></p>
                    <p class="header-text" id="tosDivision"></p>
                    <p class="header-text text-blue-700 font-semibold" id="tosSchool"></p>
                </div>
                <div class="mb-4 text-center border-t border-b border-gray-100 py-2">
                    <p class="font-bold text-gray-800 text-base" id="tosTitle"></p>
                    <p class="text-xs text-gray-600 font-medium" id="tosSY"></p>
                </div>
                <p class="font-bold text-gray-700 uppercase tracking-wide text-xs mb-2">TABLE OF SPECIFICATIONS</p>
                <div id="tosContent" class="overflow-x-auto"></div>
            </div>

            <div class="bg-white rounded-lg shadow p-5 border border-gray-200">
                <h2 class="section-title border-b pb-2 mb-4 text-blue-800">TEST QUESTIONS</h2>
                <div id="testContent" class="space-y-4"></div>
            </div>

            <div class="bg-white rounded-lg shadow p-5 border border-gray-200">
                <h2 class="section-title border-b pb-2 mb-4 text-blue-800">ANSWER KEY</h2>
                <div id="answerKey"></div>
            </div>
        </div>
    </div>

    <script>
        const MISTRAL_API_KEY = "GVgRqeTk5bdH4GYa10FRAw7hC3x2vqyF";

        const COGNITIVE = {
            remembering: { label: "Remembering", percent: 25 },
            understanding: { label: "Understanding", percent: 30 },
            applying: { label: "Applying", percent: 20 },
            analyzing: { label: "Analyzing", percent: 15 },
            evaluating: { label: "Evaluating", percent: 7 },
            creating: { label: "Creating", percent: 3 }
        };
        const COGNITIVE_ORDER = ["remembering", "understanding", "applying", "analyzing", "evaluating", "creating"];

        const subjectMapping = {
            "Kindergarten": ["Makabansa", "Languages", "Mathematics", "GMRC"],
            "Primary": ["English", "Filipino", "Mathematics", "Makabansa", "GMRC", "Reading and Literacy", "Science (Grade 3)"],
            "Intermediate": ["English", "Filipino", "Mathematics", "Science", "Araling Panlipunan", "MAPEH", "EPP", "GMRC"],
            "JHS": ["English", "Filipino", "Mathematics", "Science", "Araling Panlipunan", "MAPEH", "TLE", "Values Education"],
            "SHS": ["Oral Communication", "Komunikasyon at Pananaliksik", "General Mathematics", "21st Century Literature", "Earth and Life Science", "Personal Development", "Understanding Culture, Society and Politics", "Empowerment Technologies", "Media and Information Literacy"]
        };

        function updateLearningAreas() {
            const grade = document.getElementById("grade").value;
            const select = document.getElementById("subject");
            select.innerHTML = "";
            
            let list = [];
            if (grade === "Kindergarten") list = subjectMapping["Kindergarten"];
            else if (["Grade 1", "Grade 2", "Grade 3"].includes(grade)) list = subjectMapping["Primary"];
            else if (["Grade 4", "Grade 5", "Grade 6"].includes(grade)) list = subjectMapping["Intermediate"];
            else if (["Grade 7", "Grade 8", "Grade 9", "Grade 10"].includes(grade)) list = subjectMapping["JHS"];
            else list = subjectMapping["SHS"];

            list.forEach(subj => {
                let opt = document.createElement("option");
                opt.value = subj;
                opt.textContent = subj;
                select.appendChild(opt);
            });
        }

        updateLearningAreas();

        async function callMistral(prompt) {
            const response = await fetch("https://api.mistral.ai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${MISTRAL_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "mistral-small-latest",
                    response_format: { type: "json_object" },
                    temperature: 0.4,
                    max_tokens: 800,
                    messages: [{ role: "user", content: prompt }]
                })
            });
            if (!response.ok) throw new Error(`API Error: ${response.statusText}`);
            const data = await response.json();
            return JSON.parse(data.choices[0].message.content.trim());
        }

        async function generateAIQuestion(competencyDesc, domain, subject, grade, outputLang) {
            const framingStyles = [
                "Contextual Scenario: Frame item around a localized situational scenario utilizing typical Philippine settings.",
                "Functional Stem Sentence: Formulate a clear declarative prompt statement ending with a completion trigger.",
                "Direct Critical Request: Frame as a concise action instruction query matching the targeted cognitive capability."
            ];
            const chosenStyle = framingStyles[Math.floor(Math.random() * framingStyles.length)];

            const prompt = `
You are a DepEd master curriculum specialist drafting test questions. Generate a multiple-choice item matching these instructions:
- Grade: ${grade}
- Learning Area: ${subject}
- Competency Focus: ${competencyDesc}
- Cognitive Level: ${domain}
- Structural Framing Format: ${chosenStyle}
- Target Output Language Requirement: Generate completely in ${outputLang.toUpperCase()}. (If requested language is TAGALOG, write exclusively in clear, localized Tagalog language).

CRITICAL CONSTRAINTS:
1. Never start the stem with formulaic expressions like "Alin sa mga sumusunod" or "Which of the following".
2. Ensure there are exactly 4 options (A, B, C, D). Distractors must look highly plausible.
3. Output the final correct entry explicitly wrapped inside the options label structure.

Return ONLY a valid JSON object matching this structure:
{
  "question": "The question string text",
  "options": ["A. ...", "B. ...", "C. ...", "D. ..."],
  "correct": "A. ..." 
}`;

            try {
                return await callMistral(prompt);
            } catch {
                return {
                    question: outputLang === "Tagalog" ? `Suriin ang kaisipan na may kaugnayan sa: ${competencyDesc}. Ano ang angkop na kahulugan nito?` : `Analyze the context regarding: ${competencyDesc}. What is its correct execution?`,
                    options: outputLang === "Tagalog" ? ["A. Maling pagpipilian A", "B. Tamang sagot sa pagsusuri", "C. Maling pagpipilian C", "D. Maling pagpipilian D"] : ["A. Distractor Option One", "B. Correct Evaluation Option", "C. Distractor Option Two", "D. Distractor Option Three"],
                    correct: outputLang === "Tagalog" ? "B. Tamang sagot sa pagsusuri" : "B. Correct Evaluation Option"
                };
            }
        }

        function getCognitiveTotal(total) {
            let dist = {};
            let sum = 0;
            for (const [key, val] of Object.entries(COGNITIVE)) {
                dist[key] = Math.round(total * (val.percent / 100));
                sum += dist[key];
            }
            while (sum !== total) {
                if (sum < total) dist.remembering++;
                else dist.understanding--;
                sum = Object.values(dist).reduce((a, b) => a + b, 0);
            }
            return dist;
        }

        async function generateAll() {
            const btn = document.getElementById("generateBtn");
            const status = document.getElementById("status");
            btn.disabled = true;
            status.textContent = "Processing pedagogical language matrix... please wait...";
            status.className = "loading";

            const region = document.getElementById("region").value;
            const division = document.getElementById("division").value;
            const school = document.getElementById("school").value;
            const subject = document.getElementById("subject").value;
            const grade = document.getElementById("grade").value;
            const testType = document.getElementById("testType").value;
            const quarter = document.getElementById("quarter").value;
            const sy = document.getElementById("sy").value;
            const total = parseInt(document.getElementById("totalItems").value);

            const tagalogSubjects = ["Filipino", "Makabansa", "GMRC", "Araling Panlipunan", "Komunikasyon at Pananaliksik", "ESP"];
            const outputLang = tagalogSubjects.includes(subject) ? "Tagalog" : "English";

            const competencies = document.getElementById("competencies").value
                .trim()
                .split("\n")
                .map(line => line.trim())
                .filter(line => line.length > 0)
                .map(desc => ({ desc: desc, code: "N/A", days: "N/A" }));

            if (competencies.length < 1) {
                alert("Please type or paste at least one competency description line.");
                btn.disabled = false;
                status.textContent = "";
                return;
            }

            const compCount = competencies.length;
            const cogTotal = getCognitiveTotal(total);
            const perComp = Math.floor(total / compCount);
            const remainder = total % compCount;

            const tosData = [];
            const testItems = [];
            const answerKeys = [];
            let currentItem = 1;
            let cogAssigned = { remembering: 0, understanding: 0, applying: 0, analyzing: 0, evaluating: 0, creating: 0 };

            for (let i = 0; i < compCount; i++) {
                const itemsForComp = perComp + (i < remainder ? 1 : 0);
                const percent = ((itemsForComp / total) * 100).toFixed(1);
                const start = currentItem;
                const end = currentItem + itemsForComp - 1;
                const cogRow = { remembering: 0, understanding: 0, applying: 0, analyzing: 0, evaluating: 0, creating: 0 };

                for (let j = 0; j < itemsForComp; j++) {
                    let selectedDomain;
                    for (const d of COGNITIVE_ORDER) {
                        if (cogAssigned[d] < cogTotal[d]) {
                            selectedDomain = d;
                            break;
                        }
                    }
                    if (!selectedDomain) selectedDomain = "remembering";

                    cogAssigned[selectedDomain]++;
                    cogRow[selectedDomain]++;

                    const q = await generateAIQuestion(competencies[i].desc, selectedDomain, subject, grade, outputLang);
                    q.itemNo = currentItem;
                    q.domain = selectedDomain;
                    testItems.push(q);
                    answerKeys.push({ no: currentItem, ans: q.correct });
                    currentItem++;
                }

                tosData.push({
                    no: i + 1,
                    competency: competencies[i].desc,
                    code: competencies[i].code,
                    days: competencies[i].days,
                    percent: percent,
                    items: itemsForComp,
                    range: itemsForComp > 0 ? `${start}-${end}` : "0",
                    cog: cogRow
                });
            }

            document.getElementById("tosRegion").textContent = region;
            document.getElementById("tosDivision").textContent = division;
            document.getElementById("tosSchool").textContent = school;
            document.getElementById("tosTitle").textContent = `${subject} - ${grade} (${quarter} ${testType})`;
            document.getElementById("tosSY").textContent = sy;

            document.getElementById("tosContent").innerHTML = `
                <table class="tos-table">
                    <thead>
                        <tr>
                            <th rowspan="2" style="width:5%;">No.</th>
                            <th rowspan="2" style="width:35%;">Learning Competency Description</th>
                            <th rowspan="2" style="width:10%;">Percentage</th>
                            <th rowspan="2" style="width:8%;">No. of Items</th>
                            <th rowspan="2" style="width:10%;">Item Range</th>
                            <th colspan="6" style="width:32%;">COGNITIVE PROCESS DIMENSIONS</th>
                        </tr>
                        <tr>
                            <th>Rem</th>
                            <th>Und</th>
                            <th>App</th>
                            <th>Ana</th>
                            <th>Eva</th>
                            <th>Cre</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tosData.map(r => `
                            <tr>
                                <td class="text-center font-medium">${r.no}</td>
                                <td>${r.competency}</td>
                                <td class="text-center">${r.percent}%</td>
                                <td class="text-center font-semibold">${r.items}</td>
                                <td class="text-center">${r.range}</td>
                                <td class="text-center text-gray-600">${r.cog.remembering || ""}</td>
                                <td class="text-center text-gray-600">${r.cog.understanding || ""}</td>
                                <td class="text-center text-gray-600">${r.cog.applying || ""}</td>
                                <td class="text-center text-gray-600">${r.cog.analyzing || ""}</td>
                                <td class="text-center text-gray-600">${r.cog.evaluating || ""}</td>
                                <td class="text-center text-gray-600">${r.cog.creating || ""}</td>
                            </tr>
                        `).join("")}
                        <tr class="total-row">
                            <td colspan="2" class="text-right pr-4">Total</td>
                            <td class="text-center">100%</td>
                            <td class="text-center">${total}</td>
                            <td class="text-center">1-${total}</td>
                            <td class="text-center">${cogTotal.remembering}</td>
                            <td class="text-center">${cogTotal.understanding}</td>
                            <td class="text-center">${cogTotal.applying}</td>
                            <td class="text-center">${cogTotal.analyzing}</td>
                            <td class="text-center">${cogTotal.evaluating}</td>
                            <td class="text-center">${cogTotal.creating}</td>
                        </tr>
                    </tbody>
                </table>`;

            document.getElementById("testContent").innerHTML = `
                <p class="mb-4 text-gray-700 font-medium italic">${outputLang === "Tagalog" ? "Panuto: Basahing mabuti ang bawat tanong at piliin ang pinakatamang sagot." : "Directions: Read each item carefully and choose the best answer."}</p>
                <div class="space-y-4">
                    ${testItems.map(q => `
                        <div class="p-2 rounded hover:bg-gray-50">
                            <p class="mb-1 text-gray-900"><strong>${q.itemNo}.</strong> ${q.question} <span class="text-xs text-blue-500 font-mono font-normal">(${q.domain})</span></p>
                            <div class="ml-6 space-y-0.5 text-gray-700">
                                ${q.options.map(o => `<p>${o}</p>`).join("")}
                            </div>
                        </div>
                    `).join("")}
                </div>`;

            document.getElementById("answerKey").innerHTML = `
                <table class="key-table max-w-sm">
                    <thead>
                        <tr>
                            <th class="text-center" style="width:40%;">Item No.</th>
                            <th style="width:60%;">Correct Answer Option Key</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${answerKeys.map(k => `
                            <tr>
                                <td class="text-center font-bold text-gray-700">${k.no}</td>
                                <td class="font-medium text-green-700">${k.ans}</td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>`;

            document.getElementById("output").classList.remove("hidden");
            window.generatedData = { region, division, school, subject, grade, testType, quarter, sy, total, tosData, cogTotal, testItems, answerKeys, outputLang };
            status.textContent = "✅ Balanced assessment matrix configured!";
            status.className = "text-green-600 text-center font-bold";
            btn.disabled = false;
        }

        function exportPDF() {
            if (!window.generatedData) { alert("Please compile a matrix first!"); return; }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
            const d = window.generatedData;
            let y = 15;

            // Helper function to sanitize text strings from hidden copy-paste characters
            const sanitizeText = (text) => {
                if (!text) return "";
                return text
                    .replace(/[\u200B-\u200D\uFEFF]/g, "") // Removes zero-width spaces
                    .replace(/[^\x20-\x7E\u00A0-\u00FF\u0100-\u017F\u0400-\u04FF]/g, " ") // Validates normal spectrum printable text
                    .replace(/\s+/g, " ")
                    .trim();
            };

            // Header Elements
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.text("Republic of the Philippines", 105, y, { align: "center" }); y += 5;
            doc.setFont("helvetica", "bold");
            doc.setFontSize(11);
            doc.text("Department of Education", 105, y, { align: "center" }); y += 6;
            doc.setFont("helvetica", "normal");
            doc.setFontSize(10);
            if(d.region) { doc.text(sanitizeText(d.region), 105, y, { align: "center" }); y += 5; }
            if(d.division) { doc.text(sanitizeText(d.division), 105, y, { align: "center" }); y += 5; }
            if(d.school) { doc.text(sanitizeText(d.school), 105, y, { align: "center" }); y += 8; }
            doc.setFont("helvetica", "bold");
            doc.text(`${sanitizeText(d.subject)} - ${sanitizeText(d.grade)} (${sanitizeText(d.quarter)} ${sanitizeText(d.testType)})`, 105, y, { align: "center" }); y += 5;
            doc.setFont("helvetica", "normal");
            if(d.sy) doc.text(sanitizeText(d.sy), 105, y, { align: "center" }); y += 8;

            doc.setFont("helvetica", "bold").setFontSize(11);
            doc.text("TABLE OF SPECIFICATIONS", 105, y, { align: "center" }); y += 5;

            doc.autoTable({
                startY: y,
                head: [["No.", "Learning Competency Description", "%", "Items", "Range", "Rem", "Und", "App", "Ana", "Eva", "Cre"]],
                body: d.tosData.map(r => [
                    r.no, 
                    sanitizeText(r.competency), 
                    `${r.percent}%`, 
                    r.items, 
                    r.range,
                    r.cog.remembering || "", 
                    r.cog.understanding || "", 
                    r.cog.applying || "",
                    r.cog.analyzing || "", 
                    r.cog.evaluating || "", 
                    r.cog.creating || ""
                ]),
                foot: [["Total", "", "100%", d.total, `1-${d.total}`, d.cogTotal.remembering, d.cogTotal.understanding, d.cogTotal.applying, d.cogTotal.analyzing, d.cogTotal.evaluating, d.cogTotal.creating]],
                theme: "grid",
                styles: { fontSize: 8, cellPadding: 2, textColor: "#111111", font: "helvetica" },
                headStyles: { fillColor: "#f3f4f6", textColor: "#111111", fontStyle: "bold" },
                footStyles: { fillColor: "#16a34a", textColor: "#ffffff", fontStyle: "bold" },
                columnStyles: {
                    1: { cellWidth: 65 } // Prevent long competency statements from overlapping columns
                }
            });

            doc.addPage();
            y = 20;
            doc.setFont("helvetica", "bold").setFontSize(12);
            doc.text("TEST QUESTIONS", 105, y, { align: "center" }); y += 10;
            doc.setFont("helvetica", "normal").setFontSize(10);
            doc.text(d.outputLang === "Tagalog" ? "Panuto: Basahing mabuti ang bawat tanong at piliin ang pinakatamang sagot." : "Directions: Read each item carefully and choose the best answer.", 15, y); y += 10;

            d.testItems.forEach(q => {
                doc.setFont("helvetica", "bold");
                const stem = `${q.itemNo}. ${sanitizeText(q.question)}`;
                const stemLines = doc.splitTextToSize(stem, 180);
                
                // Track page vertical overflow dynamically
                if (y + (stemLines.length * 5) > 275) { doc.addPage(); y = 20; }
                doc.text(stemLines, 15, y);
                y += (stemLines.length * 5) + 2;

                doc.setFont("helvetica", "normal");
                q.options.forEach(opt => {
                    const cleanOpt = sanitizeText(opt);
                    const optLines = doc.splitTextToSize(cleanOpt, 170);
                    
                    if (y + (optLines.length * 5) > 275) { doc.addPage(); y = 20; }
                    doc.text(optLines, 22, y);
                    y += (optLines.length * 5) + 1;
                });
                y += 3;
            });

            if (y + 40 > 275) { doc.addPage(); y = 20; } else { y += 10; }
            
            doc.setFont("helvetica", "bold").setFontSize(12);
            doc.text("ANSWER KEY", 15, y); y += 5;
            doc.autoTable({
                startY: y,
                head: [["Item No.", "Correct Answer Option Key"]],
                body: d.answerKeys.map(k => [k.no, sanitizeText(k.ans)]),
                theme: "grid",
                styles: { fontSize: 10, cellPadding: 2, font: "helvetica" },
                headStyles: { fillColor: "#f3f4f6", textColor: "#111111" },
                margin: { left: 15 },
                tableWidth: 80
            });

            doc.save(`TOS_Assessment_Portrait.pdf`);
        }
