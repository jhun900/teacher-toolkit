<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DepEd Grade-Level Reading Material Generator</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Century Gothic', CenturyGothic, AppleGothic, sans-serif;
        }
        body {
            background-color: #f3f4f6;
            color: #1f2937;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #1e3a8a;
            border-bottom: 3px solid #3b82f6;
            padding-bottom: 10px;
            margin-top: 0;
            font-size: 24px;
        }
        .control-panel {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #334155;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            background-color: white;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-generate {
            background-color: #2563eb;
            color: white;
        }
        .btn-generate:hover {
            background-color: #1d4ed8;
        }
        .btn-print {
            background-color: #059669;
            color: white;
        }
        .btn-print:hover {
            background-color: #047857;
        }
        
        /* Preview Layout */
        .output-preview {
            border: 2px dashed #cbd5e1;
            padding: 40px;
            border-radius: 8px;
            background: #ffffff;
            min-height: 400px;
        }

        .size-young {
            font-size: 14pt !important;
            line-height: 2.0;
        }
        .size-older {
            font-size: 12pt !important;
            line-height: 1.8;
        }

        .material-section {
            margin-bottom: 20px;
        }
        .material-title {
            color: #1e3a8a;
            border-left: 5px solid #2563eb;
            padding-left: 10px;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .word-grid {
            display: table;
            width: 100%;
            border-collapse: separate;
            border-spacing: 12px;
            margin-top: 15px;
        }
        .word-row {
            display: table-row;
        }
        .word-cell {
            display: table-cell;
            padding: 18px 10px;
            width: 25%;
            text-align: center;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background-color: #f8fafc;
        }
        
        .list-distributed {
            margin: 0;
            padding-left: 25px;
        }
        .list-distributed li {
            margin-bottom: 18px;
            padding-bottom: 5px;
        }

        .story-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: justify;
        }
        .comprehension-questions {
            margin-top: 25px;
        }
        .question-item {
            margin-bottom: 25px;
            page-break-inside: avoid;
        }
        .options-block {
            margin-top: 8px;
            padding-left: 15px;
        }
        .option-item {
            margin-bottom: 6px;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .container {
                box-shadow: none;
                padding: 0;
                max-width: 100%;
            }
            .control-panel, h1 {
                display: none !important;
            }
            .output-preview {
                border: none;
                padding: 0;
            }
            @page {
                size: A4;
                margin: 20mm 15mm;
            }
            .word-cell {
                background-color: transparent !important;
            }
        }
    </style>
</head>

        story = `Academic research within the parameters of ${fld} expanded dramatically following the excavation of several ${art}. Comprehensive multi-spectral parsing immediately ${dsc}. By validating these ancient data metrics against modern computer simulations, the research team successfully updated previous assumptions regarding early migratory timelines and agricultural resource distribution maps.`;

            { q: `What primary analytical breakthrough was achieved through multi-spectral parsing?`, options: [`a. It immediately ${dsc}`, "b. It refuted early hominid dental records", "c. It mapped regional plate tectonic shifts", "d. It calculated solar radiation variance caps"], ans: "a" },
            { q: `What modern method was used to validate the newly found ancient data metrics?`, options: ["a. Cross-checking manual trade bookkeeping ledgers", `b. Modern computer simulations`, "c. Microscopic visual analysis of soil depth scales", "d. Standard public opinion surveys among communities"], ans: "b" },
            { q: `Which historical understanding was updated because of the team's research?`, options: [`a. Early migratory timelines and agricultural resource distribution maps`, "b. The exact chemical configuration of ancient armor sets", "c. Deep ocean geological pressure parameters near faults", "d. Language dialect variations across urban trading centers"], ans: "a" }
        ];
    }
    else if (grade === "Grade 9") {

        const res = selectRandom(pool.results);

        title = `${structures} ${titleDisc}`;
        story = `Empirical papers focusing on ${disc} indicate that ${cat} operates as the primary biochemical driver for ${res}. This systematic process suggests that homeostatic stability requires a non-linear series of internal chemical re-alignments. Rather than following gradualist evolutionary paths, these localized adjustments allow complex biological networks to withstand sudden external resource constraints and environmental threats.`;
        
        questions = [
            { q: `What scientific domain provides the conceptual framework for this analysis?`, options: ["a. Astro-physics propulsion dynamics", `b. Empirical papers focusing on ${disc}`, "c. Architectural acoustics tracking", "d. Algorithmic software encryption laws"], ans: "b" },
            { q: `According to the research, what serves as the primary biochemical driver?`, options: [`a. The mechanism of ${cat}`, "b. Gradual macro climate cycles", "c. Artificial radiation exposures", "d. Random genetic drift across borders"], ans: "a" },
            { q: `What direct physiological or structural result is caused by this primary catalyst?`, options: ["a. High rates of cellular decay", "b. Gradual loss of regulatory functions", `c. The generation of ${res}`, "d. Absolute termination of cellular transport"], ans: "c" },
            { q: `What does this systematic biochemical process imply about homeostatic stability?`, options: ["a. It can be easily maintained without shifting internal metrics", `b. It requires a non-linear series of internal chemical re-alignments`, "c. It follows a completely predictable, static timeline structure", "d. It depends entirely on external technological intervention tools"], ans: "b" },
            { q: `What major advantage do these localized structural adjustments offer to biological networks?`, options: [`a. The ability to withstand sudden external constraints and threats`, "b. Accelerated growth patterns across plain territories", "c. Elimination of metabolic requirements inside cell units", "d. Seamless conversion of heavy mineral elements to energy"], ans: "a" }

        ];
    }

    return { title: title, story: story, questions: questions };
}

function shuffleArray(arr) {
    return arr.sort(() => 0.5 - Math.random());
}

function generateMaterial() {
    const grade = document.getElementById("gradeSelect").value;
    const resourceType = document.getElementById("resourceSelect").value;
    const previewArea = document.getElementById("outputPreview");
    
    const isYoung = ["Kinder", "Grade 1", "Grade 2", "Grade 3"].includes(grade);
    const fontClass = isYoung ? "size-young" : "size-older";
    previewArea.className = "output-preview " + fontClass;
    
    let html = `
        <div style="text-align: center; margin-bottom: 35px; border-bottom: 2px solid #1e3a8a; padding-bottom: 12px;">
            <h2 style="margin: 0; color: #1e3a8a; font-size: 22px; text-transform: uppercase;">LEARNING WORKSHEET AND ASSESSMENT PLATFORM</h2>
        </div>
    `;

    if (phonicsPools[resourceType]) {
        let labelName = resourceType.replace("fam-", "SHORT VOWEL WORD FAMILY: -").toUpperCase();
        if(resourceType.startsWith("long-")) {
            labelName = "LONG VOWEL SOUND STRUCTURE: " + resourceType.split("-")[1].toUpperCase();
        } else if(!resourceType.startsWith("fam-")) {
            labelName = resourceType.toUpperCase() + " STRUCTURES";
        }
        
        let pool = [...phonicsPools[resourceType]];
        while(pool.length < 20) { pool = pool.concat(pool); } 
        let selectedWords = shuffleArray(pool).slice(0, 20).map(w => w.toLowerCase());

        html += `
            <div class="material-section">
                <div class="material-title">${labelName}</div>
                <p style="margin-top:0; margin-bottom: 20px; color:#475569; font-style:italic;">Practice decoding exactly twenty distributed vocabulary items below:</p>
                <div class="word-grid">
                    <div class="word-row">${selectedWords.slice(0, 4).map(w => `<div class="word-cell">${w}</div>`).join('')}</div>
                    <div class="word-row">${selectedWords.slice(4, 8).map(w => `<div class="word-cell">${w}</div>`).join('')}</div>
                    <div class="word-row">${selectedWords.slice(8, 12).map(w => `<div class="word-cell">${w}</div>`).join('')}</div>
                    <div class="word-row">${selectedWords.slice(12, 16).map(w => `<div class="word-cell">${w}</div>`).join('')}</div>
                    <div class="word-row">${selectedWords.slice(16, 20).map(w => `<div class="word-cell">${w}</div>`).join('')}</div>
                </div>
            </div>
        `;
    } 
    else if (resourceType === "phrases") {
        let pool = [...stringArrays[grade].phrases];
        let selectedPhrases = shuffleArray(pool).slice(0, 20).map(p => p.toLowerCase());

        html += `
            <div class="material-section">
                <div class="material-title">Target Instructional Phrases (20 Items)</div>
                <p style="margin-top:0; margin-bottom: 20px; color:#475569; font-style:italic;">Practice accurate reading on exactly twenty items:</p>
                <ol class="list-distributed">
                    ${selectedPhrases.map(p => `<li>${p}</li>`).join('')}
                </ol>
            </div>
        `;
    } 
    else if (resourceType === "sentences") {
        let pool = [...stringArrays[grade].sentences];
        let selectedSentences = shuffleArray(pool).slice(0, 20);

        html += `
            <div class="material-section">
                <div class="material-title">Sentence Fluency Exercises (20 Items)</div>
                <p style="margin-top:0; margin-bottom: 20px; color:#475569; font-style:italic;">Read each structured sentence statement carefully:</p>
                <ol class="list-distributed">
                    ${selectedSentences.map(s => `<li>${s}</li>`).join('')}
                </ol>
            </div>
        `;
    } 
    else if (resourceType === "short-stories") {
        const generatedMaterial = generateDynamicStory(grade);

        html += `
            <div class="material-section">
                <div class="material-title">Dynamic Reading Literacy Assessment (${grade})</div>
                <div style="text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 1.3em; letter-spacing:0.5px; color:#1e3a8a;">${generatedMaterial.title}</div>
                <div class="story-box">
                    "${generatedMaterial.story}"
                </div>
                <div class="comprehension-questions">
                    <div style="font-weight: bold; margin-bottom: 15px; color: #1e3a8a; border-bottom: 1px solid #cbd5e1; padding-bottom: 5px;">
                        Comprehension Check | Format: Multiple Choice Assessment
                    </div>
                    ${generatedMaterial.questions.map((qObj, idx) => {
                        let questionHtml = `
                            <div class="question-item">
                                <div><strong>${idx + 1}. ${qObj.q}</strong></div>
                                <div class="options-block">
                        `;
                        qObj.options.forEach(opt => {
                            questionHtml += `<div class="option-item">${opt}</div>`;
                        });
                        questionHtml += `
                                </div>
                            </div>
                        `;
                        return questionHtml;
                    }).join('')}
                </div>
            </div>
        `;
    }

    previewArea.innerHTML = html;
}

function exportToPDF() {
    window.print();
}
